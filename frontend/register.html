<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — DueMind Pro</title>
  <link rel="stylesheet" href="css/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="auth-body">

<div class="auth-container">
  <div class="auth-left">
    <div class="auth-brand"><i class="fa-solid fa-brain"></i> <span>DueMind Pro</span></div>
    <h1>Start Your<br>Productive Journey ✨</h1>
    <p>Create your free account and take full control of your tasks, time, and goals.</p>
    <div class="auth-perks">
      <div class="perk"><i class="fa-solid fa-check-circle"></i> Free forever, no card needed</div>
      <div class="perk"><i class="fa-solid fa-check-circle"></i> Unlimited tasks</div>
      <div class="perk"><i class="fa-solid fa-check-circle"></i> Full analytics access</div>
    </div>
  </div>
  <div class="auth-right">
    <div class="auth-card">
      <h2>Create Account</h2>
      <p class="auth-sub">Already registered? <a href="login.html">Sign in</a></p>
      <div id="auth-error" class="auth-alert hidden"></div>
      <div class="form-group">
        <label>Full Name</label>
        <div class="input-icon">
          <i class="fa-solid fa-user"></i>
          <input type="text" id="name" placeholder="John Doe" required>
        </div>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <div class="input-icon">
          <i class="fa-solid fa-envelope"></i>
          <input type="email" id="email" placeholder="you@example.com" required>
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-icon">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="password" placeholder="Min 6 characters" required>
          <!-- <button class="pw-toggle" onclick="togglePw('password',this)"><i class="fa-solid fa-eye"></i></button> -->
        </div>
        <div class="pw-strength" id="pw-strength"></div>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <div class="input-icon">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="confirmPassword" placeholder="Repeat password" required>
        </div>
      </div>
      <button class="btn-auth" id="registerBtn" onclick="handleRegister()">
        <span>Create Account</span> <i class="fa-solid fa-user-plus"></i>
      </button>
      <div class="auth-divider"><span>or</span></div>
      <a href="index.html" class="btn-back"><i class="fa-solid fa-home"></i> Back to Home</a>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
