<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — DueMind Pro</title>
  <link rel="stylesheet" href="../css/app.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <i class="fa-solid fa-brain"></i>
    <span>DueMind Pro</span>
  </div>
  <nav class="sidebar-nav">
    <a href="dashboard.html" class="nav-item active">
      <i class="fa-solid fa-gauge"></i><span>Dashboard</span>
    </a>
    <a href="tasks.html" class="nav-item">
      <i class="fa-solid fa-list-check"></i><span>All Tasks</span>
    </a>
    <a href="completed.html" class="nav-item">
      <i class="fa-solid fa-circle-check"></i><span>Completed</span>
    </a>
    <a href="analytics.html" class="nav-item">
      <i class="fa-solid fa-chart-bar"></i><span>Analytics</span>
    </a>
    <a href="profile.html" class="nav-item">
      <i class="fa-solid fa-user"></i><span>Profile</span>
    </a>
  </nav>
  <div class="sidebar-footer">
    <button class="btn-logout" onclick="logout()">
      <i class="fa-solid fa-right-from-bracket"></i> Logout
    </button>
  </div>
</aside>

<!-- MAIN -->
<div class="main-wrapper">

  <!-- TOP NAV -->
  <header class="topbar">
    <button class="sidebar-toggle" onclick="toggleSidebar()">
      <i class="fa-solid fa-bars"></i>
    </button>
    <div class="topbar-title">
      <h1>Dashboard</h1>
      <span id="greeting"></span>
    </div>
    <div class="topbar-right">
      <button class="btn-new-task" onclick="openTaskModal()">
        <i class="fa-solid fa-plus"></i> New Task
      </button>
      <div class="topbar-user">
        <div class="user-avatar" id="userAvatar">U</div>
        <span id="userName"></span>
      </div>
    </div>
  </header>

  <!-- CONTENT -->
  <main class="content">

    <!-- STATS CARDS -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon purple"><i class="fa-solid fa-list-check"></i></div>
        <div class="stat-info">
          <div class="stat-value" id="statTotal">—</div>
          <div class="stat-label">Total Tasks</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon red"><i class="fa-solid fa-triangle-exclamation"></i></div>
        <div class="stat-info">
          <div class="stat-value" id="statOverdue">—</div>
          <div class="stat-label">Overdue</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon orange"><i class="fa-solid fa-clock"></i></div>
        <div class="stat-info">
          <div class="stat-value" id="statDueToday">—</div>
          <div class="stat-label">Due Today</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon green"><i class="fa-solid fa-circle-check"></i></div>
        <div class="stat-info">
          <div class="stat-value" id="statCompleted">—</div>
          <div class="stat-label">Completed</div>
        </div>
      </div>
    </div>

    <!-- RECENT TASKS -->
    <div class="section-card">
      <div class="section-card-header">
        <h2>Recent Tasks</h2>
        <a href="tasks.html" class="view-all">View All <i class="fa-solid fa-arrow-right"></i></a>
      </div>
      <div id="recentTasks" class="task-list">
        <div class="loading-spinner"><i class="fa-solid fa-spinner fa-spin"></i> Loading...</div>
      </div>
    </div>

  </main>
</div>

<!-- TASK MODAL -->
<div class="modal-overlay" id="taskModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">New Task</h3>
      <button onclick="closeTaskModal()"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="taskId">
      <div class="form-group">
        <label>Title *</label>
        <input type="text" id="taskTitle" placeholder="Task title..." required>
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="taskDesc" rows="3" placeholder="Optional description..."></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Category</label>
          <select id="taskCategory">
            <option>General</option>
            <option>Work</option>
            <option>Personal</option>
            <option>Health</option>
            <option>Finance</option>
            <option>Education</option>
            <option>Shopping</option>
          </select>
        </div>
        <div class="form-group">
          <label>Priority</label>
          <select id="taskPriority">
            <option>Low</option>
            <option selected>Medium</option>
            <option>High</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Due Date *</label>
          <input type="date" id="taskDate" required>
        </div>
        <div class="form-group">
          <label>Due Time</label>
          <input type="time" id="taskTime">
        </div>
      </div>
      <div class="form-group">
        <label>Recurring</label>
        <select id="taskRecurring">
          <option>None</option>
          <option>Daily</option>
          <option>Weekly</option>
          <option>Monthly</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeTaskModal()">Cancel</button>
      <button class="btn-save" onclick="saveTask()">Save Task</button>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/notifications.js"></script>
<script src="../js/dashboard.js"></script>
</body>
</html>
