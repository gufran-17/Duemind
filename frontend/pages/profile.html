<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Profile — DueMind Pro</title>
  <link rel="stylesheet" href="../css/app.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand"><i class="fa-solid fa-brain"></i><span>DueMind Pro</span></div>
  <nav class="sidebar-nav">
    <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-gauge"></i><span>Dashboard</span></a>
    <a href="tasks.html" class="nav-item"><i class="fa-solid fa-list-check"></i><span>All Tasks</span></a>
    <a href="completed.html" class="nav-item"><i class="fa-solid fa-circle-check"></i><span>Completed</span></a>
    <a href="analytics.html" class="nav-item"><i class="fa-solid fa-chart-bar"></i><span>Analytics</span></a>
    <a href="profile.html" class="nav-item active"><i class="fa-solid fa-user"></i><span>Profile</span></a>
  </nav>
  <div class="sidebar-footer"><button class="btn-logout" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button></div>
</aside>
<div class="main-wrapper">
  <header class="topbar">
    <button class="sidebar-toggle" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
    <div class="topbar-title"><h1>Profile</h1></div>
    <div class="topbar-right">
      <div class="topbar-user"><div class="user-avatar" id="userAvatar">U</div><span id="userName"></span></div>
    </div>
  </header>
  <main class="content">
    <div class="profile-grid">
      <!-- USER INFO CARD -->
      <div class="section-card profile-card">
        <div class="profile-avatar-big" id="profileAvatarBig">U</div>
        <div class="profile-details">
          <h2 id="profileName">Loading...</h2>
          <p id="profileEmail"></p>
          <p class="profile-since">Member since <span id="profileSince"></span></p>
        </div>
        <button class="btn-danger-outline" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
      </div>
      <!-- CHANGE PASSWORD -->
      <div class="section-card">
        <h2 style="margin-bottom:20px">Change Password</h2>
        <div id="pwAlert" class="auth-alert hidden"></div>
        <div class="form-group">
          <label>Current Password</label>
          <div class="input-icon">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="currentPw" placeholder="Current password">
            <!--<button class="pw-toggle" onclick="togglePw('currentPw',this)"><i class="fa-solid fa-eye"></i></button> -->
          </div>
        </div>
        <div class="form-group">
          <label>New Password</label>
          <div class="input-icon">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="newPw" placeholder="New password (min 6 chars)">
          </div>
        </div>
        <div class="form-group">
          <label>Confirm New Password</label>
          <div class="input-icon">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="confirmPw" placeholder="Confirm new password">
          </div>
        </div>
        <button class="btn-save" onclick="changePassword()">Update Password</button>
      </div>
    </div>
  </main>
</div>
<script src="../js/api.js"></script>
<script src="../js/profile.js"></script>
</body></html>
